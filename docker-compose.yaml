# ── Valjean demo stack ────────────────────────────────────────────────────────
# Usage:
#   cp .env.example .env        # fill in OPENAI_API_KEY, DEEPGRAM_API_KEY
#   docker compose up --build

services:

  # ── Redis (required by LiveKit for distributed state) ─────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  # ── LiveKit server ─────────────────────────────────────────────────────────
  livekit:
    image: livekit/livekit-server:latest
    command: --config /etc/livekit/livekit.yaml
    ports:
      - "7880:7880"             # WebSocket / HTTP
      - "7881:7881"             # TURN/TCP
      - "50000-60000:50000-60000/udp"  # RTC UDP range (matches livekit.yaml)
    volumes:
      - ./livekit.yaml:/etc/livekit/livekit.yaml:ro
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7880/"]
      interval: 5s
      retries: 10

  # ── Orchestrator (Go) — built from repo root ──────────────────────────────
  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      LIVEKIT_URL:    ws://livekit:7880
      LIVEKIT_KEY:    devkey
      LIVEKIT_SECRET: secret
      ADDR:           :8080
    depends_on:
      livekit:
        condition: service_healthy
    restart: unless-stopped

  # ── Agent worker (Python) — built from repo root ──────────────────────────
  # Scale with: docker compose up --scale agent-worker=3
  agent-worker:
    build:
      context: .
      dockerfile: agent.Dockerfile
    ports:
      - "7010:7010"
    environment:
      LIVEKIT_URL:      ws://livekit:7880
      LIVEKIT_KEY:      devkey
      LIVEKIT_SECRET:   secret
      ORCHESTRATOR_URL: http://orchestrator:8080
#      OPENAI_API_KEY:   ${OPENAI_API_KEY}
#      DEEPGRAM_API_KEY: ${DEEPGRAM_API_KEY}
      CMD_PORT:         "7010"
    depends_on:
      - orchestrator
    restart: unless-stopped
