version: "3.9"

# ── Valjean demo stack ────────────────────────────────────────────────────────
# All services use network_mode: host because livekit/sip requires it
# (SIP/RTP use dynamic ports impractical to map via Docker NAT)
# With host networking, all services reach each other via localhost
#
# Usage:
#   cp .env.example .env
#   docker compose up -d

services:

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    network_mode: host
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "-p", "6379", "ping" ]
      interval: 3s
      timeout: 3s
      retries: 10

  # ── LiveKit ────────────────────────────────────────────────────────────────
  livekit:
    image: livekit/livekit-server:latest
    network_mode: host
    command: --config /etc/livekit.yaml
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml:ro
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── LiveKit SIP ────────────────────────────────────────────────────────────
  sip:
    image: livekit/sip
    network_mode: host
    environment:
      SIP_CONFIG_BODY: |
        api_key: 'devkey'
        api_secret: 'secret'
        ws_url: 'ws://localhost:7880'
        redis:
          address: 'localhost:6379'
        sip_port: 5060
        rtp_port: 10000-20000
        use_external_ip: true
        logging:
          level: debug
    depends_on:
      - livekit
    restart: unless-stopped

  # ── Orchestrator ───────────────────────────────────────────────────────────
  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile
    network_mode: host
    environment:
      LIVEKIT_URL: ws://localhost:7880
      LIVEKIT_KEY: devkey
      LIVEKIT_SECRET: secret
      ADDR: :8080
    depends_on:
      - livekit
    restart: unless-stopped

  # ── Agent worker ───────────────────────────────────────────────────────────
  agent-worker:
    build:
      context: .
      dockerfile: agent.Dockerfile
    network_mode: host
    environment:
      LIVEKIT_URL: ws://localhost:7880
      LIVEKIT_KEY: devkey
      LIVEKIT_SECRET: secret
      ORCHESTRATOR_URL: http://localhost:8080
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      DEEPGRAM_API_KEY: ${DEEPGRAM_API_KEY}
      CMD_PORT: "7010"
    depends_on:
      - orchestrator
    restart: unless-stopped
